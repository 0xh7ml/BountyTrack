{% extends "base.html" %}
{% block title %}Create User | Bounty Track{% endblock %}
{% block pagename %}Create User{% endblock %}

{% block RightHeaderContent %}
<div class="float-right">
  <a href="{% url 'users' %}" class="btn btn-secondary btn-sm">
    <i class="fas fa-arrow-left mr-1"></i> Back
  </a>
</div>
{% endblock %}

{% block content %}
<div class="col-md-6 offset-md-3">
  <div class="card">
    <div class="card-header"><h5 class="mb-0">Create New User</h5></div>
    <div class="card-body">
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" name="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Role</label>
          <select class="form-select form-control" name="role">
            <option value="">-- No Role --</option>
            {% for role in roles %}
              <option value="{{ role.id }}">{{ role.name }}</option>
            {% endfor %}
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Create User</button>
        <a href="{% url 'users' %}" class="btn btn-secondary ml-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
