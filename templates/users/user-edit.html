{% extends "base.html" %}
{% block title %}Edit User | Bounty Track{% endblock %}
{% block pagename %}Edit User{% endblock %}

{% block RightHeaderContent %}
<div class="float-right">
  <a href="{% url 'users' %}" class="btn btn-secondary btn-sm">
    <i class="fas fa-arrow-left mr-1"></i> Back
  </a>
</div>
{% endblock %}

{% block content %}
<div class="col-md-6 offset-md-3">
  <div class="card">
    <div class="card-header">
      <h5 class="mb-0">Edit User — {{ user_obj.username }}</h5>
    </div>
    <div class="card-body">
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" name="first_name" value="{{ user_obj.first_name }}">
        </div>
        <div class="mb-3">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" name="last_name" value="{{ user_obj.last_name }}">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" value="{{ user_obj.email }}">
        </div>
        <div class="mb-3">
          <label class="form-label">Role</label>
          <select class="form-select form-control" name="role">
            <option value="">-- No Role --</option>
            {% for role in roles %}
              <option value="{{ role.id }}"
                {% if user_obj.profile.role.id == role.id %}selected{% endif %}>
                {{ role.name }}
              </option>
            {% endfor %}
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'users' %}" class="btn btn-secondary ml-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
